# PriceWise — one-command container.
#   docker compose up --build      # -> http://localhost:8000
services:
  pricewise:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      # The slim image has no curl/wget, so probe /health with Python's stdlib.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
